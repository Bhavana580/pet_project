<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join Paws & Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 id="authTitle" class="text-2xl font-bold text-center text-slate-900 mb-6">Account Login</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Username</label>
                <input id="username" type="text" class="w-full border p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input id="password" type="password" class="w-full border p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <button onclick="handleSubmit()" id="submitBtn" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Login</button>
        </div>

        <p class="mt-4 text-sm text-center text-slate-600">
            <span id="toggleText">Don't have an account?</span> 
            <button onclick="toggleMode()" id="toggleBtn" class="text-indigo-600 font-semibold underline">Register here</button>
        </p>
    </div>

    <script>
        let isLogin = true;
        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('authTitle').innerText = isLogin ? "Account Login" : "Create Account";
            document.getElementById('submitBtn').innerText = isLogin ? "Login" : "Register Now";
            document.getElementById('toggleText').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggleBtn').innerText = isLogin ? "Register here" : "Login here";
        }

        async function handleSubmit() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const endpoint = isLogin ? '/api/login' : '/api/register';

            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();

            if (response.ok) {
                if (isLogin) { window.location.href = '/dashboard'; } 
                else { alert("Registration successful! Now logging you in..."); toggleMode(); }
            } else { alert(data.error || "An error occurred."); }
        }
    </script>
</body>
</html>
