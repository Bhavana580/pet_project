<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Paws & Care Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
    <nav class="p-5 bg-white shadow-sm flex justify-between items-center max-w-7xl mx-auto rounded-b-xl">
        <span class="text-2xl font-bold text-indigo-600">🐾 Paws&Care</span>
        <div>
            <a href="/auth" class="px-5 py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition">Get Started</a>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 py-20 text-center lg:text-left flex flex-col lg:flex-row items-center gap-12">
        <div class="space-y-6 lg:w-1/2">
            <h1 class="text-5xl font-extrabold tracking-tight text-slate-900 leading-tight">
                Find your perfect companion & track their <span class="text-indigo-600">Healthcare</span> seamlessly.
            </h1>
            <p class="text-lg text-slate-600">
                A unified platform dedicated to simplifying pet registration, local animal adoptions, medical checks, vaccine schedules, and wellness logs.
            </p>
            <div class="pt-4">
                <a href="/auth" class="px-8 py-4 bg-indigo-600 text-white font-semibold text-lg rounded-xl shadow-lg hover:shadow-indigo-200 hover:bg-indigo-700 transition">Adopt or Register Today</a>
            </div>
        </div>
        <div class="lg:w-1/2">
            <img src="https://images.unsplash.com/photo-1450778869180-41d0601e046e?w=800" alt="Happy pets" class="rounded-2xl shadow-2xl">
        </div>
    </header>
</body>
</html>
